spring.application.name=userexpense

# ‚îÄ‚îÄ Database ‚îÄ‚îÄ
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ‚îÄ‚îÄ JPA / Hibernate ‚îÄ‚îÄ
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ‚îÄ‚îÄ JWT ‚îÄ‚îÄ
jwt.secretKey=${JWT_SECRET}

# ‚îÄ‚îÄ Spring Security default user ‚îÄ‚îÄ
spring.security.user.name=root
spring.security.user.password=root

# ‚îÄ‚îÄ Kafka Consumer (Railway internal) ‚îÄ‚îÄ
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS}
spring.kafka.consumer.group-id=user-group

# ‚îÄ‚îÄ Redis ‚îÄ‚îÄ
spring.redis.host=${REDIS_HOST}
spring.redis.port=${REDIS_PORT}
spring.redis.password=${REDIS_PASSWORD}
spring.redis.username=default
spring.redis.database=0
spring.redis.timeout=120s
spring.redis.ssl.enabled=true

# ‚îÄ‚îÄ Mail ‚îÄ‚îÄ
spring.mail.host=sandbox.smtp.mailtrap.io
spring.mail.port=2525
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}

# ‚îÄ‚îÄ OpenAI ‚îÄ‚îÄ
spring.ai.openai.api-key=${OPENAI_API_KEY}
spring.ai.openai.chat.options.model=gpt-4o-mini

# ‚îÄ‚îÄ CORS ‚îÄ‚îÄ
app.cors.front-end-url=${FRONTEND_URL}

# ‚îÄ‚îÄ Logging ‚îÄ‚îÄ
logging.level.com.example=INFO